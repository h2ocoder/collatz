name: Snapshot Validate

# Runs on every push to validate that this universe is in a healthy state.
# Uses `emanon validate` to check the canonical structure, values.json schema,
# .gitattributes merge-driver registration, and genus stamps in regions/.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: Validate universe structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout universe
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for commit-message checks

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/emanon-cli/target
          key: ${{ runner.os }}-cargo-emanon-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-emanon-

      - name: Build and install emanon CLI
        run: |
          git clone --depth=1 https://github.com/h2ocoder/collatz emanon-repo
          cd emanon-repo/emanon/src/cli
          cargo install --path . --locked 2>/dev/null || cargo install --path .
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Validate universe
        id: validate
        run: emanon validate

      - name: Comment validation result on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.validate.outcome }}';
            const icon = outcome === 'success' ? '✅' : '❌';
            const msg = outcome === 'success'
              ? '**Universe validation passed.** All required directories, files, and merge-driver registrations are present.'
              : '**Universe validation failed.** Run `emanon validate` locally to see the full error list.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${icon} ${msg}`,
            });
